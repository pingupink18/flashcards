<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字卡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --ink: #1a1410;
    --accent: #c8603a;
    --muted: #8a7f72;
    --card-bg: #fefcf7;
    --card-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    gap: 32px;
  }

  header {
    text-align: center;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  header p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .progress-bar {
    width: min(480px, 100%);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bar-track {
    flex: 1;
    height: 4px;
    background: #ddd6c8;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Card scene */
  .scene {
    width: min(380px, 90vw);
    height: 240px;
    perspective: 1000px;
    cursor: pointer;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.flipped {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 32px;
    border: 1.5px solid rgba(0,0,0,0.06);
  }

  .face-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    position: absolute;
    top: 18px;
    left: 24px;
  }

  .face-front .main-text {
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    color: var(--ink);
  }

  .face-back {
    transform: rotateY(180deg);
  }

  .color-swatch {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.6);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .color-name {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 700;
    text-align: center;
    color: var(--ink);
  }
  .color-hex {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .hint {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    opacity: 0.7;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem;
    font-weight: 700;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }

  .btn-nav {
    width: 48px;
    height: 48px;
    background: white;
    color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    font-size: 1.2rem;
  }
  .btn-nav:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.14); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-flip {
    padding: 12px 28px;
    background: var(--accent);
    color: white;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 16px rgba(200,96,58,0.3);
  }
  .btn-flip:hover { background: #b8502c; }

  .counter {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--muted);
    min-width: 60px;
    text-align: center;
  }

  /* Shuffle */
  .btn-shuffle {
    padding: 8px 16px;
    background: transparent;
    color: var(--muted);
    border: 1.5px solid #ccc8be;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    border-radius: 8px;
  }
  .btn-shuffle:hover { border-color: var(--accent); color: var(--accent); }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 40px;
  }
</style>
</head>
<body>

<header>
  <h1>單字卡</h1>
  <p>點擊卡片翻面</p>
</header>

<div class="progress-bar">
  <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  <span class="progress-text" id="progressText">0 / 0</span>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face face-front">
      <span class="face-label">名稱</span>
      <div class="main-text" id="frontText">—</div>
      <span class="hint">點擊翻面 →</span>
    </div>
    <div class="face face-back">
      <span class="face-label">顏色</span>
      <div class="color-swatch" id="colorSwatch"></div>
      <div class="color-name" id="colorName">—</div>
      <div class="color-hex" id="colorHex"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-nav" id="btnPrev" onclick="navigate(-1)" title="上一張">←</button>
  <button class="btn btn-flip" onclick="flipCard()">翻面</button>
  <button class="btn btn-nav" id="btnNext" onclick="navigate(1)" title="下一張">→</button>
</div>

<button class="btn btn-shuffle" onclick="shuffle()">🔀 隨機排序</button>

<script>

const COLOR_MAP = {
  '綠': '#4caf7d',
  '黃': '#f0c040',
  '藍': '#4a90d9',
  '紅': '#e05555',
  '紫': '#9b6fd4',
  '粉': '#f48fb1',
};

const DATA = [
  { name: '深淵秘印', color: '綠' },
  { name: '深淵霞暈', color: '綠' },
  { name: '失落綠洲', color: '綠' },
  { name: '飛羽向夜', color: '綠' },
  { name: '貓德守則', color: '綠' },
  { name: '大肆雨照夜', color: '綠' },
  { name: '不設防禁區', color: '綠' },
  { name: '即興放逐', color: '黃' },
  { name: '繚夜魂與', color: '黃' },
  { name: '花漫谷間', color: '黃' },
  { name: '猩紅彌散', color: '藍' },
  { name: '猩紅席捲', color: '藍' },
  { name: '熾光淋漓', color: '藍' },
  { name: '無效禁錮', color: '藍' },
  { name: '愛貓及喵', color: '藍' },
  { name: '造物宣示', color: '藍' },
  { name: '混沌紀', color: '紅' },
  { name: '戀速引擎', color: '紅' },
  { name: '無罪樊籠', color: '紫' },
  { name: '熱意揣度', color: '紫' },
  { name: '至心棲之處', color: '紫' },
  { name: '掠心奪味', color: '粉' },
  { name: '掠心相授', color: '粉' },
  { name: '千燈共我', color: '粉' },
  { name: '方寸盈餘', color: '粉' },
  { name: '風臨野', color: '粉' },
  { name: '明暗界', color: '粉' },
  { name: '潛入之夜', color: '粉' },
];
// ─────────────────────────────────────────────────────

let cards = [...DATA];
let current = 0;
let flipped = false;

function render() {
  const c = cards[current];
  document.getElementById('frontText').textContent = c.name;
  document.getElementById('colorName').textContent = c.color;
  document.getElementById('colorHex').textContent = '';
  document.getElementById('colorSwatch').style.background = COLOR_MAP[c.color] || '#ccc';

  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === cards.length - 1;

  const pct = cards.length > 1 ? (current / (cards.length - 1)) * 100 : 100;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${current + 1} / ${cards.length}`;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= cards.length) return;
  const card = document.getElementById('card');
  if (flipped) {
    flipped = false;
    card.classList.remove('flipped');
    setTimeout(() => { current = next; render(); }, 520);
  } else {
    current = next;
    render();
  }
}

function shuffle() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  current = 0;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

// 鍵盤支援
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

render();
</script>
</body>
</html>
